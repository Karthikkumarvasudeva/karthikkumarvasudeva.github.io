<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080B10;--bg2:#0D1118;--bg3:#111620;
  --surface:#141923;--surface2:#1A2030;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --ink:#F0EDE8;--ink2:#9BA3B0;--ink3:#5A6270;
  --gold:#C8A96A;--gold2:#D9B86C;
  --mono:'JetBrains Mono',monospace;
  --serif:'Instrument Serif',Georgia,serif;
  --sans:'Syne',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:16px;line-height:1.7;overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 3rem;display:flex;align-items:center;justify-content:space-between;height:64px;border-bottom:1px solid var(--border);background:rgba(8,11,16,0.95);backdrop-filter:blur(20px)}
.nav-logo{font-family:var(--mono);font-size:0.75rem;color:var(--ink2);letter-spacing:0.12em;text-decoration:none}.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:2.5rem;list-style:none}
.nav-links a{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;color:var(--ink3);transition:color .2s}.nav-links a:hover{color:var(--gold)}
.sec{padding:7rem 3rem 4rem;max-width:1400px;margin:0 auto}
.sec-label{font-family:var(--mono);font-size:0.62rem;color:var(--gold);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:1rem}.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-h{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);color:var(--ink);margin-bottom:2rem}.sec-h em{color:var(--gold);font-style:italic}

/* Gallery Grid */
.gallery-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  gap: 1.8rem;
}

.gallery-item {
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  transition: transform 0.3s ease, border-color 0.3s ease;
}

.gallery-item:hover {
  transform: translateY(-5px);
  border-color: var(--gold);
}

.gallery-image-wrapper {
  position: relative;
  overflow: hidden;
  aspect-ratio: 4 / 3;
  cursor: pointer;
}

.gallery-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.gallery-item:hover .gallery-image {
  transform: scale(1.05);
}

.gallery-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(8,11,16,0.95), transparent);
  padding: 2rem 1rem 1rem 1rem;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}

.gallery-item:hover .gallery-overlay {
  transform: translateY(0);
}

.gallery-caption {
  color: var(--ink);
  font-family: var(--mono);
  font-size: 0.75rem;
  letter-spacing: 0.05em;
  line-height: 1.4;
  text-align: center;
}

.back-link {
  display: inline-block;
  margin-top: 3rem;
  font-family: var(--mono);
  font-size: 0.75rem;
  color: var(--gold);
  text-decoration: none;
  border: 1px solid var(--gold);
  padding: 10px 24px;
  border-radius: 30px;
  transition: all 0.3s ease;
}

.back-link:hover {
  background: var(--gold);
  color: var(--bg);
}

footer{border-top:1px solid var(--border);padding:2rem 3rem;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.ft-l{font-family:var(--mono);font-size:0.8rem;color:var(--ink2)}
.ft-r{display:flex;gap:2rem}.ft-r a{font-family:var(--mono);font-size:0.8rem;color:var(--ink3);text-decoration:none}.ft-r a:hover{color:var(--gold)}

@media(max-width:900px){
  nav{padding:0 1.5rem}.nav-links{display:none}
  .sec{padding:5rem 1.5rem 3rem}
  .gallery-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
}
</style>
</head>

<script>
// Lightbox functionality
const galleryWrappers = document.querySelectorAll('.gallery-image-wrapper');
const lightbox = document.createElement('div');
lightbox.id = 'lightbox';
lightbox.style.cssText = `
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.95); display: none; justify-content: center;
  align-items: center; z-index: 10000; cursor: pointer;
`;
const lightboxImg = document.createElement('img');
lightboxImg.style.cssText = `
  max-width: 90%; max-height: 90%; object-fit: contain;
  border-radius: 8px; border: 2px solid var(--gold);
`;
lightbox.appendChild(lightboxImg);
document.body.appendChild(lightbox);

galleryWrappers.forEach(wrapper => {
  const img = wrapper.querySelector('.gallery-image');
  wrapper.addEventListener('click', (e) => {
    e.stopPropagation();
    lightboxImg.src = img.src;
    lightbox.style.display = 'flex';
  });
});

lightbox.addEventListener('click', () => {
  lightbox.style.display = 'none';
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && lightbox.style.display === 'flex') {
    lightbox.style.display = 'none';
  }
});
</script>
